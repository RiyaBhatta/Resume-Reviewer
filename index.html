<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Reviewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Resume Reviewer</h1>
      <p>Paste your resume and get instant AI-powered feedback</p>
    </header>

    <div class="input-section">
      <div class="field">
        <label>Resume <span class="required">*</span></label>
        <div id="dropZone" class="drop-zone" onclick="document.getElementById('fileInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="fileInput" accept=".pdf,.docx" style="display:none" onchange="onFileSelect(event)" />
          <div id="dropContent">
            <div class="drop-icon">📄</div>
            <p>Drop your resume here or <span class="link">browse</span></p>
            <small>PDF or DOCX, max 5MB</small>
          </div>
          <div id="fileSelected" class="hidden">
            <span id="fileName"></span>
            <button class="remove-btn" onclick="removeFile(event)">✕</button>
          </div>
        </div>
        <div class="divider"><span>or paste text</span></div>
        <textarea id="resume" placeholder="Paste your resume content here..." rows="6"></textarea>
      </div>
      <div class="field">
        <label for="jobDesc">Job Description <span class="optional">(optional)</span></label>
        <textarea id="jobDesc" placeholder="Paste the job description to tailor the review..." rows="5"></textarea>
      </div>
      <button id="reviewBtn" onclick="reviewResume()">Analyze Resume</button>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Analyzing your resume...</p>
    </div>

    <div id="results" class="hidden">
      <div class="score-card">
        <div class="score-circle">
          <span id="scoreValue">0</span>
          <small>/100</small>
        </div>
        <p id="summary"></p>
      </div>

      <div class="feedback-grid">
        <div class="card strengths">
          <h3>✅ Strengths</h3>
          <ul id="strengthsList"></ul>
        </div>
        <div class="card improvements">
          <h3>⚠️ Improvements</h3>
          <ul id="improvementsList"></ul>
        </div>
      </div>

      <div class="feedback-grid">
        <div class="card">
          <h3>🔑 Keywords Found</h3>
          <div id="keywordsFound" class="tags"></div>
        </div>
        <div class="card">
          <h3>🔍 Missing Keywords</h3>
          <div id="keywordsMissing" class="tags missing"></div>
        </div>
      </div>

      <div class="card sections-card">
        <h3>📋 Section Feedback</h3>
        <div id="sectionsFeedback"></div>
      </div>
    </div>

    <div id="error" class="hidden error-card">
      <p id="errorMsg"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
